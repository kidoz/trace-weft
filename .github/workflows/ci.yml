name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: "true"

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - uses: taiki-e/install-action@cargo-nextest
      - run: cargo nextest run --workspace --all-features
      - run: cargo test --workspace --all-features --doc

  supply-chain:
    name: Supply Chain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: EmbarkStudios/cargo-deny-action@v2
      - uses: taiki-e/install-action@cargo-machete
      - run: cargo machete

  web:
    name: Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm --prefix apps/web ci
      - run: npm --prefix apps/web run generate:api
      - run: npm --prefix apps/web run lint
      - run: npm --prefix apps/web run test
      - run: npm --prefix apps/web run build
      - run: npm --prefix apps/web exec playwright install chromium --with-deps
      - run: npm --prefix apps/web run test:e2e
