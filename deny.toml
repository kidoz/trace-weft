[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
# Only flag unmaintained crates the workspace depends on directly. The remaining
# `unmaintained` advisories are transitive GTK/WebKit deps (gtk-rs, unic,
# proc-macro-error) pulled in by Tauri for the desktop app, with no safe upgrade
# available; flagging them would block CI on dependencies we don't control.
unmaintained = "workspace"
ignore = []

[licenses]
version = 2
confidence-threshold = 0.8
# Workspace-internal crates (examples, CLI, desktop) are `publish = false` and
# carry no license field; they fall under the repo's top-level MIT license, so
# skip the per-crate license check for them.
private = { ignore = true }
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
    "Zlib",
]
exceptions = []

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
